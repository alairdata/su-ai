name: so_unfiltered_ai
description: So UnFiltered AI - Mobile App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: '>=3.16.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP & networking
  dio: ^5.4.3+1

  # Secure storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Navigation
  go_router: ^14.2.7

  # UI
  flutter_markdown: ^0.7.3+2
  google_fonts: ^6.2.1

  # Models (code gen)
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # Local cache
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # File handling
  image_picker: ^1.1.2
  file_picker: ^8.1.6
  mime: ^2.0.0

  # Utilities
  intl: ^0.19.0
  connectivity_plus: ^6.0.5
  url_launcher: ^6.3.1
  package_info_plus: ^8.1.2

  # Push notifications
  firebase_core: ^3.8.1
  firebase_messaging: ^15.1.6
  flutter_local_notifications: ^18.0.1

  # Analytics & error tracking
  sentry_flutter: ^8.12.0

  # Image caching
  cached_network_image: ^3.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.3

flutter:
  uses-material-design: true
